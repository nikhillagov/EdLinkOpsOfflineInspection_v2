<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EdLink Offline Inspection</title>
    <script>
      window.onerror = function(msg, src, line, col, err) {
        document.body.innerHTML = '<div style="padding:30px;color:red;font-family:monospace;background:#fff;border:2px solid red;margin:20px;border-radius:8px"><h2>❌ JavaScript Error</h2><pre>' + msg + '\n\nFile: ' + src + '\nLine: ' + line + '\n\n' + (err ? err.stack : '') + '</pre></div>';
      };
      window.addEventListener('unhandledrejection', function(e) {
        document.body.innerHTML = '<div style="padding:30px;color:red;font-family:monospace;background:#fff;border:2px solid red;margin:20px;border-radius:8px"><h2>❌ Unhandled Promise Rejection</h2><pre>' + (e.reason ? (e.reason.stack || e.reason.message || String(e.reason)) : 'Unknown error') + '</pre></div>';
      });
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
